        problem: "בתור מתמודד עם קוליטיס הצורך שזיהיתי הוא פער מהותי בין עצם קיומה של מחלה כרונית לבין היכולת של אדם לנהל חיים שלמים סביבה בצורה יציבה, מסודרת ותומכת. הבעיה איננה רק רפואית אלא מערכתית וחברתית. אדם עם מחלה כרונית אינו מנהל רק תסמינים. הוא מנהל בדיקות, רופאים, תורים, תרופות, תוספים, מסמכים, בירוקרטיה, זכויות, עבודה, לימודים וחיים אישיים במקביל. לעיתים קרובות הוא נדרש להתמודד לבד מול ביטוח לאומי, מערכות בריאות וגורמים מוסדיים, ללא הכוונה ברורה וללא כלים מסודרים. מעבר לפיזור המידע ולעומס הידע הסותר, קיימת תחושת חוסר אונים עמוקה. רבים אינם יודעים מה מגיע להם, כיצד לבקש התאמות בלימודים או בעבודה, ואיך לשלב בין בריאות לחיים תפקודיים. הקושי אינו רק פיזי אלא גם רגשי וחברתי. תחושת בדידות, בושה וחוסר שייכות מלוות מתמודדים רבים. הקהילות הקיימות לרוב מפוזרות ואינן מספקות תשתית מסודרת וארוכת טווח. בישראל אין כיום פלטפורמה אינטגרטיבית שמאגדת ניהול רפואי, הנגשת זכויות, תוכן מותאם, קהילה ותמיכה מעשית במקום אחד. בנוסף קיימת בעיית מודעות ציבורית. מחלות כרוניות ובעיקר מחלות מעי אינן מדוברות בהיקף שתואם את סדר הגודל שלהן. חסר שיח פתוח ומנרמל שמציג את ההתמודדות כחלק מהחיים ולא כמשהו שיש להסתיר. העלאת מודעות דרך פעילות ברשתות החברתיות מאפשרת להגיע לקהלים רחבים, לייצר חשיפה משמעותית וליצור שיתופי פעולה רלוונטיים שיכולים להרחיב את ההשפעה ולהוביל לפרויקטים חברתיים נוספים. המיזם מבקש לתת מענה כולל לשלושה מישורים מרכזיים ניהול חכם ומאורגן של כלל ההיבטים הרפואיים והבירוקרטיים יצירת קהילה בטוחה שמפחיתה בדידות ומחזקת תחושת שייכות והובלת שינוי תודעתי רחב יותר סביב התמודדות כרונית המטרה היא להפוך מצב של חוסר סדר וחוסר אונים למערכת שמייצרת שליטה, בהירות וחיים תפקודיים ויציבים יותר עבור אלפי מתמודדים.",

let currentIndex = 0;

// Break times per day
const breaks = {
    "22.3": ["12:50-13:00"],
    "24.3": ["12:50-13:00"]
};

// Status management
const STATUS_KEY = 'masa-candidates-status';
const STATUS_CYCLE = [null, 'accepted', 'rejected'];

function getAllStatuses() {
    try { return JSON.parse(localStorage.getItem(STATUS_KEY)) || {}; } catch(e) { return {}; }
}

function getStatus(id) {
    return getAllStatuses()[id] || null;
}

function toggleStatus(id) {
    const statuses = getAllStatuses();
    const current = statuses[id] || null;
    const nextIndex = (STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length;
    const next = STATUS_CYCLE[nextIndex];

    if (next) { statuses[id] = next; } else { delete statuses[id]; }
    localStorage.setItem(STATUS_KEY, JSON.stringify(statuses));

    // Update UI without full re-render
    document.querySelectorAll(`[data-id="${id}"]`).forEach(el => {
        el.classList.remove('accepted', 'rejected');
        if (next) el.classList.add(next);
        const dot = el.querySelector('.status-dot');
        if (dot) {
            dot.classList.remove('accepted', 'rejected');
            if (next) dot.classList.add(next);
        }
    });
    updateStatusCounts();
}

function updateStatusCounts() {
    const statuses = getAllStatuses();
    document.querySelectorAll('.status-summary').forEach(el => {
        const date = el.dataset.date;
        const ids = candidates.filter(c => c.date === date).map(c => c.id);
        const accepted = ids.filter(id => statuses[id] === 'accepted').length;
        const rejected = ids.filter(id => statuses[id] === 'rejected').length;
        el.innerHTML = accepted || rejected
            ? `<span class="accepted-count">${accepted} &#10003;</span><span class="rejected-count">${rejected} &#10007;</span>`
            : '';
    });
}

function renderSchedules() {
    const sunday = candidates.filter(c => c.date === "22.3");
    const tuesday = candidates.filter(c => c.date === "24.3");

    document.getElementById('schedule-sunday').innerHTML = buildTable(sunday, "22.3");
    document.getElementById('schedule-tuesday').innerHTML = buildTable(tuesday, "24.3");
    updateStatusCounts();
}

function getWhatsappURL(c) {
    const zoomLink = c.date === '22.3'
        ? 'https://us06web.zoom.us/j/89695012960?pwd=099s5g4CtWPp4ikB7wXgQsmzIRbgAY.1'
        : 'https://us06web.zoom.us/j/85112696992?pwd=GzcSJlaLa2WFhZboTDenhbjUF6iBBX.1';
    const firstName = c.name.split(' ')[0];
    const msg = `היי ${firstName}, תזכורת להיות מוכן/ה למצגת הזום שלך בשעה ${c.time} 🔗 ${zoomLink}`;
    const phone = c.phone.replace(/[-\s]/g, '').replace(/^0/, '972');
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
}

function buildTable(items, date) {
    // Build all time slots including breaks
    const allSlots = [];
    items.forEach(c => allSlots.push({ type: 'candidate', data: c }));

    // Insert break
    if (breaks[date]) {
        breaks[date].forEach(b => {
            allSlots.push({ type: 'break', time: b });
        });
    }

    // Sort by start time
    allSlots.sort((a, b) => {
        const tA = a.type === 'break' ? a.time.split('-')[0] : a.data.time.split('-')[0];
        const tB = b.type === 'break' ? b.time.split('-')[0] : b.data.time.split('-')[0];
        return tA.localeCompare(tB);
    });

    // Desktop table
    let html = `<table>
        <thead><tr>
            <th>שעה</th>
            <th>שם</th>
            <th>תקציר המיזם</th>
            <th>עיר</th>
            <th></th>
            <th>סטטוס</th>
        </tr></thead><tbody>`;

    allSlots.forEach(slot => {
        if (slot.type === 'break') {
            html += `<tr class="break-row"><td colspan="6">הפסקה ${slot.time}</td></tr>`;
        } else {
            const c = slot.data;
            const status = getStatus(c.id);
            const statusClass = status ? ` ${status}` : '';
            const targetId = c.detailTarget;
            const waURL = getWhatsappURL(c);
            html += `<tr class="row${statusClass}" data-id="${c.id}" onclick="showDetail(${targetId})">
                <td class="col-time">${c.time}</td>
                <td class="col-name">${c.name}</td>
                <td class="col-summary">${c.summary}</td>
                <td class="col-city">${c.city}</td>
                <td class="col-wa"><a href="${waURL}" target="_blank" onclick="event.stopPropagation()" class="wa-icon" title="שלח תזכורת בוואטסאפ">📲</a></td>
                <td class="col-status"><span class="status-dot${statusClass}" onclick="event.stopPropagation(); toggleStatus(${c.id})"></span></td>
            </tr>`;
        }
    });

    html += `</tbody></table>`;

    // Mobile list
    html += `<div class="mobile-list">`;
    allSlots.forEach(slot => {
        if (slot.type === 'break') {
            html += `<div class="mobile-break">הפסקה ${slot.time}</div>`;
        } else {
            const c = slot.data;
            const mStatus = getStatus(c.id);
            const mStatusClass = mStatus ? ` ${mStatus}` : '';
            const targetId = c.detailTarget;
            const mWaURL = getWhatsappURL(c);
            html += `<div class="mobile-item${mStatusClass}" data-id="${c.id}" onclick="showDetail(${targetId})">
                <div class="m-time">${c.time}</div>
                <div class="m-content">
                    <div class="m-name">${c.name}</div>
                    <div class="m-summary">${c.summary}</div>
                    <div class="m-city">${c.city}</div>
                </div>
                <a href="${mWaURL}" target="_blank" onclick="event.stopPropagation()" class="wa-icon m-wa">📲</a>
                <div class="m-status"><span class="status-dot${mStatusClass}" onclick="event.stopPropagation(); toggleStatus(${c.id})"></span></div>
            </div>`;
        }
    });
    html += `</div>`;

    return html;
}

                : 'https://us06web.zoom.us/j/85112696992?pwd=GzcSJlaLa2WFhZboTDenhbjUF6iBBX.1';
            const firstName = c.name.split(' ')[0];
            const msg = \`היי \${firstName}, תזכורת להיות מוכן/ה למצגת הזום שלך בשעה \${c.time} 🔗 \${zoomLink}\`;
            const phone = c.phone.replace(/[-\\s]/g, '').replace(/^0/, '972');
            const waURL = \`https://wa.me/\${phone}?text=\${encodeURIComponent(msg)}\`;
            return \`<a href="\${waURL}" target="_blank" class="whatsapp-btn">📲 שלח תזכורת בוואטסאפ</a>\`;
        })()}
    `;

    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('detailPage').classList.add('active');

    document.getElementById('prevBtn').disabled = (id === 0);
    document.getElementById('nextBtn').disabled = (id === candidates.length - 1);

    window.scrollTo(0, 0);
}

function showMain() {
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('detailPage').classList.remove('active');
    window.scrollTo(0, 0);
}

function navigateCandidate(dir) {
    const newIndex = currentIndex + dir;
    if (newIndex >= 0 && newIndex < candidates.length) {
        showDetail(newIndex);
    }
}

renderSchedules();
</script>
